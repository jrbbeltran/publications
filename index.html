        function renderPublications(filtered) {
            const container = document.getElementById('publications-container');
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-16 text-slate-400">No publications match your search.</div>`;
                return;
            }

            filtered.forEach(pub => {
                const cardHTML = `
                    <div class="pub-card bg-slate-900 border border-slate-700 rounded-3xl p-6 flex gap-6">
                        <div class="flex-1">
                            <div class="flex items-start justify-between">
                                <div>
                                    <h3 class="font-semibold text-lg leading-tight mb-1">${pub.title}</h3>
                                    <div class="text-xs text-emerald-400 mb-3">${pub.year} • ${pub.venue}</div>
                                </div>
                                ${pub.doi ? `<a href="${pub.url}" target="_blank" class="shrink-0 text-xs px-4 py-1.5 bg-slate-800 hover:bg-slate-700 rounded-full flex items-center gap-x-1 text-slate-400 hover:text-white">DOI <i class="fa-solid fa-arrow-up-right-from-square"></i></a>` : ''}
                            </div>
                            <div class="text-sm text-slate-400 line-clamp-3">${pub.authors.join(', ')}</div>
                            ${pub.keywords && pub.keywords.length ? `<div class="mt-4 flex flex-wrap gap-1">${pub.keywords.map(k => `<span class="inline-block bg-slate-800 text-xs px-3 py-1 rounded-2xl">${k}</span>`).join('')}</div>` : ''}
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        function filterPublications() {
            const term = document.getElementById('search-input').value.toLowerCase().trim();
            const authorFilter = document.getElementById('author-filter').value.toLowerCase();
            const typeFilter = document.getElementById('type-filter').value;

            let filtered = publications;

            if (term) {
                filtered = filtered.filter(p => 
                    p.title.toLowerCase().includes(term) || 
                    (p.authors && p.authors.some(a => a.toLowerCase().includes(term))) ||
                    (p.keywords && p.keywords.some(k => k.toLowerCase().includes(term)))
                );
            }

            if (authorFilter) {
                // More robust matching: check last name or full name parts
                filtered = filtered.filter(p => 
                    p.authors && p.authors.some(a => {
                        const authorLower = a.toLowerCase();
                        const filterParts = authorFilter.split(/[\s,]+/);
                        return filterParts.some(part => authorLower.includes(part));
                    })
                );
            }

            if (typeFilter) {
                filtered = filtered.filter(p => p.type === typeFilter);
            }

            renderPublications(filtered);
        }

        // Attach listeners
        document.getElementById('search-input').addEventListener('input', filterPublications);
        document.getElementById('author-filter').addEventListener('change', filterPublications);
        document.getElementById('type-filter').addEventListener('change', filterPublications);

        window.onload = () => renderPublications(publications);
    </script>
