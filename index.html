<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications Database | 8 Scholars in DEI, Leadership &amp; OB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .pub-card { transition: all 0.2s ease; }
        .pub-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .stats-card { background: linear-gradient(145deg, #0f172a, #1e2937); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-screen-2xl mx-auto">
        <!-- Header -->
        <div class="px-8 pt-8 pb-6 border-b border-slate-800">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-book text-slate-950 text-3xl"></i>
                    </div>
                    <div>
                        <h1 class="font-semibold text-4xl tracking-tighter">Publications Database</h1>
                        <p class="text-emerald-400">8 Scholars • DEI, Leadership, OB &amp; Latinx Research</p>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-sm text-slate-400">Merged from CVs + Scopus</div>
                    <div class="text-xs text-slate-500">June 2026</div>
                </div>
            </div>
        </div>

        <!-- Stats Bar -->
        <div class="px-8 py-6 grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="stats-card text-white rounded-3xl p-5 flex items-center justify-between">
                <div>
                    <div class="text-emerald-400 text-xs tracking-widest font-medium">TOTAL PUBLICATIONS</div>
                    <div class="text-4xl font-semibold mt-1">521</div>
                </div>
                <i class="fa-solid fa-book text-4xl opacity-20"></i>
            </div>
            <div class="stats-card text-white rounded-3xl p-5 flex items-center justify-between">
                <div>
                    <div class="text-emerald-400 text-xs tracking-widest font-medium">JOURNAL ARTICLES</div>
                    <div class="text-4xl font-semibold mt-1">366</div>
                </div>
                <i class="fa-solid fa-newspaper text-4xl opacity-20"></i>
            </div>
            <div class="stats-card text-white rounded-3xl p-5 flex items-center justify-between">
                <div>
                    <div class="text-emerald-400 text-xs tracking-widest font-medium">SCHOLARS</div>
                    <div class="text-4xl font-semibold mt-1">1440</div>
                </div>
                <i class="fa-solid fa-user-graduate text-4xl opacity-20"></i>
            </div>
            <div class="stats-card text-white rounded-3xl p-5 flex items-center justify-between">
                <div>
                    <div class="text-emerald-400 text-xs tracking-widest font-medium">YEARS SPAN</div>
                    <div class="text-4xl font-semibold mt-1">1992–2026</div>
                </div>
                <i class="fa-solid fa-calendar text-4xl opacity-20"></i>
            </div>
        </div>

        <!-- Filters -->
        <div class="px-8 pb-6">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <i class="fa-solid fa-search absolute left-5 top-4 text-slate-400"></i>
                    <input type="text" id="search-input" 
                           class="w-full bg-slate-900 border border-slate-700 rounded-2xl pl-12 pr-5 py-3.5 text-sm focus:outline-none focus:border-emerald-500"
                           placeholder="Search titles, authors, keywords...">
                </div>
                <select id="author-filter" class="bg-slate-900 border border-slate-700 rounded-2xl px-4 py-3.5 text-sm min-w-[200px]">
                    <option value="">All Authors</option>
                    <option value="Aguinis">Herman Aguinis</option>
                    <option value="Blancero">Donna Maria Blancero</option>
                    <option value="Ferdman">Bernardo M. Ferdman</option>
                    <option value="Gomez">Carolina B. Gomez</option>
                    <option value="Gonzalez">Jorge A. Gonzalez</option>
                    <option value="Gavino">Monica C. Gavino</option>
                    <option value="Ordóñez">Lisa D. Ordóñez</option>
                    <option value="Lebrón">Mariana J. Lebrón</option>
                </select>
                <select id="type-filter" class="bg-slate-900 border border-slate-700 rounded-2xl px-4 py-3.5 text-sm min-w-[180px]">
                    <option value="">All Types</option>
                    <option value="Article">Journal Articles</option>
                    <option value="Review">Reviews</option>
                    <option value="Book chapter">Book Chapters</option>
                    <option value="Editorial">Editorials</option>
                </select>
            </div>
        </div>

        <!-- Results -->
        <div class="px-8 pb-12">
            <div class="flex items-center justify-between mb-4 px-1">
                <div class="text-sm text-slate-400">
                    Showing <span id="results-count" class="font-semibold text-white">521</span> of <span class="font-semibold text-white">521</span> publications
                </div>
            </div>
            <div id="publications-container" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const publications = [
            {"id": 1, "title": "CEO vs. COO: shareholder perceptions of M&A announcements based on insider trades", "authors": ["Nguyen, V.H.", "Gomez, C.", "Mishra, S.", "Parhizgari, A.M."], "year": 2021, "venue": "Managerial Finance", "type": "Article", "doi": "10.1108/MF-07-2020-0369", "url": "https://doi.org/10.1108/MF-07-2020-0369", "keywords": ["Agency theory", "Insider trade"]},
            {"id": 2, "title": "Organizational research methods: Yearly update", "authors": ["Aguinis, H."], "year": 2007, "venue": "Organizational Research Methods", "type": "Editorial", "doi": "10.1177/1094428106296179", "url": "https://doi.org/10.1177/1094428106296179", "keywords": []},
            {"id": 3, "title": "Work, family and values in four Latin-American countries", "authors": ["Ruiz-Gutierrez, J.A.", "Murphy, E.F.", "Greenwood, R.A.", "Monserrat, S.I.", "Olivas-Luján, M.R.", "Madero, S.", "Santos, N.M.B.F.", "Uy, A.O.O."], "year": 2012, "venue": "Management Research", "type": "Article", "doi": "10.1108/1536-541211228513", "url": "https://doi.org/10.1108/1536-541211228513", "keywords": ["Values", "Work-family conflict"]},
            {"id": 4, "title": "Latinos in the United States: understanding Latinidad and its challenges for organizational research", "authors": ["Gomez, C.B.", "Gonzalez, C.B.", "Gavino, M.C.", "Ferdman, B.M.", "Martínez, P.G."], "year": 2025, "venue": "Equality, Diversity and Inclusion", "type": "Article", "doi": "10.1108/EDI-11-2024-0522", "url": "https://doi.org/10.1108/EDI-11-2024-0522", "keywords": ["Latinidad", "Diversity"]},
            {"id": 5, "title": "The entrepreneurial cognitive adjustment mechanism: transitional entrepreneurship as a solution to mitigate illegal migration", "authors": ["Arteaga-Fonseca, J.", "Zhang, Y.", "Bylund, P."], "year": 2023, "venue": "New England Journal of Entrepreneurship", "type": "Article", "doi": "10.1108/NEJE-08-2022-0059", "url": "https://doi.org/10.1108/NEJE-08-2022-0059", "keywords": ["Transitional entrepreneurship"]},
            {"id": 6, "title": "Investigating the replicability of the social and behavioural sciences", "authors": ["Tyner, A.H.", "Abatayo, A.L.", "...", "Nosek, B.A.", "Errington, T.M."], "year": 2026, "venue": "Nature", "type": "Article", "doi": "10.1038/s41586-025-10078-y", "url": "https://doi.org/10.1038/s41586-025-10078-y", "keywords": ["Reproducibility"]},
            {"id": 7, "title": "Differential prediction generalization in college admissions testing", "authors": ["Aguinis, H.", "Culpepper, S.A.", "Pierce, C.A."], "year": 2016, "venue": "Journal of Educational Psychology", "type": "Article", "doi": "10.1037/edu0000104", "url": "https://doi.org/10.1037/edu0000104", "keywords": ["Test fairness"]},
            {"id": 8, "title": "An Ounce of Prevention Is Worth a Pound of Cure: Improving Research Quality before Data Collection", "authors": ["Aguinis, H.", "Vandenberg, R.J."], "year": 2014, "venue": "Annual Review of Organizational Psychology and Organizational Behavior", "type": "Review", "doi": "10.1146/annurev-orgpsych-031413-091231", "url": "https://doi.org/10.1146/annurev-orgpsych-031413-091231", "keywords": ["Research design"]},
            {"id": 9, "title": "Methodological wishes for the next decade and how to make wishes come true", "authors": ["Aguinis, H.", "Edwards, J.R."], "year": 2014, "venue": "Journal of Management Studies", "type": "Article", "doi": "10.1111/joms.12058", "url": "https://doi.org/10.1111/joms.12058", "keywords": ["Methodology"]},
            {"id": 10, "title": "Advancing Theory by Assessing Boundary Conditions With Metaregression", "authors": ["Gonzalez-Mulé, E.", "Aguinis, H."], "year": 2018, "venue": "Journal of Management", "type": "Article", "doi": "10.1177/0149206317710723", "url": "https://doi.org/10.1177/0149206317710723", "keywords": ["Boundary conditions"]},
            {"id": 11, "title": "A Meta-Analysis of the Interactive, Additive, and Relative Effects of Cognitive Ability and Motivation on Performance", "authors": ["Van Iddekinge, C.H.", "Aguinis, H.", "Mackey, J.D.", "DeOrtentiis, P.S."], "year": 2018, "venue": "Journal of Management", "type": "Article", "doi": "10.1177/0149206317702220", "url": "https://doi.org/10.1177/0149206317702220", "keywords": ["Meta-analysis"]},
            {"id": 12, "title": "How Much Is Enough? The Relationship Between Prosocial Effort and Moral Character Judgments", "authors": ["Berry, Z.", "Lucas, B.J."], "year": 2024, "venue": "Personality and Social Psychology Bulletin", "type": "Article", "doi": "10.1177/01461672221135954", "url": "https://doi.org/10.1177/01461672221135954", "keywords": ["Moral character"]},
        ];

        function renderPublications(filtered) {
            const container = document.getElementById('publications-container');
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-16 text-slate-400">No publications match your search.</div>`;
                return;
            }

            filtered.forEach(pub => {
                const cardHTML = `
                    <div class="pub-card bg-slate-900 border border-slate-700 rounded-3xl p-6 flex gap-6">
                        <div class="flex-1">
                            <div class="flex items-start justify-between">
                                <div>
                                    <h3 class="font-semibold text-lg leading-tight mb-1">${pub.title}</h3>
                                    <div class="text-xs text-emerald-400 mb-3">${pub.year} • ${pub.venue}</div>
                                </div>
                                ${pub.doi ? `<a href="${pub.url}" target="_blank" class="shrink-0 text-xs px-4 py-1.5 bg-slate-800 hover:bg-slate-700 rounded-full flex items-center gap-x-1 text-slate-400 hover:text-white">DOI <i class="fa-solid fa-arrow-up-right-from-square"></i></a>` : ''}
                            </div>
                            <div class="text-sm text-slate-400 line-clamp-3">${pub.authors.join(', ')}</div>
                            ${pub.keywords && pub.keywords.length ? `<div class="mt-4 flex flex-wrap gap-1">${pub.keywords.map(k => `<span class="inline-block bg-slate-800 text-xs px-3 py-1 rounded-2xl">${k}</span>`).join('')}</div>` : ''}
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        function filterPublications() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = publications.filter(p => 
                p.title.toLowerCase().includes(term) || 
                p.authors.some(a => a.toLowerCase().includes(term))
            );
            renderPublications(filtered);
        }

        document.getElementById('search-input').addEventListener('input', filterPublications);
        window.onload = () => renderPublications(publications);
    </script>
</body>
</html>
