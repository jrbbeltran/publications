        function renderPublications(filtered) {
            const container = document.getElementById('publications-container');
            const countEl = document.getElementById('results-count');
            container.innerHTML = '';
            countEl.textContent = filtered.length;

            if (filtered.length === 0) {
                container.innerHTML = '<div class="text-center py-16 text-slate-400">No publications match your filters.</div>';
                return;
            }

            filtered.forEach(pub => {
                const card = document.createElement('div');
                card.className = 'pub-card bg-slate-900 border border-slate-800 rounded-3xl p-6';

                let html = `
                    <div class="flex justify-between gap-4">
                        <div class="flex-1 min-w-0">
                            <h3 class="font-semibold text-lg leading-tight mb-2 pr-4">${pub.title}</h3>
                            <div class="text-sm text-slate-400 mb-2">
                                ${pub.authors.join(', ')} 
                                <span class="mx-2 text-slate-600">•</span> 
                                <span class="font-medium text-slate-300">${pub.year}</span>
                            </div>
                            <div class="text-sm text-slate-300 mb-4">${pub.venue}</div>
                            
                            <div class="flex flex-wrap items-center gap-2">
                                <span class="inline-flex items-center px-3.5 py-1 rounded-full text-xs font-medium bg-emerald-500/10 text-emerald-400">
                                    ${pub.type}
                                </span>
                `;

                if (pub.doi) {
                    html += `<a href="https://doi.org/${pub.doi}" target="_blank" 
                               class="inline-flex items-center gap-1.5 px-3.5 py-1 rounded-full text-xs font-medium bg-slate-800 hover:bg-slate-700 text-slate-300 transition-colors">
                                <i class="fa-solid fa-external-link-alt text-[10px]"></i>
                                <span>DOI</span>
                            </a>`;
                }

                html += `</div></div></div>`;

                if (pub.keywords && pub.keywords.length > 0) {
                    html += `<div class="mt-4 flex flex-wrap gap-1.5">`;
                    pub.keywords.slice(0, 7).forEach(kw => {
                        html += `<span class="px-3 py-1 bg-slate-800 text-slate-400 rounded-2xl text-xs">${kw}</span>`;
                    });
                    html += `</div>`;
                }

                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        function filterPublications() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
            const authorFilter = document.getElementById('author-filter').value;
            const typeFilter = document.getElementById('type-filter').value;

            let filtered = publications;

            if (searchTerm) {
                filtered = filtered.filter(p => 
                    p.title.toLowerCase().includes(searchTerm) ||
                    (p.authors && p.authors.join(' ').toLowerCase().includes(searchTerm)) ||
                    (p.keywords && p.keywords.join(' ').toLowerCase().includes(searchTerm))
                );
            }

            if (authorFilter) {
                filtered = filtered.filter(p => 
                    p.authors && p.authors.some(a => a.toLowerCase().includes(authorFilter.toLowerCase()))
                );
            }

            if (typeFilter) {
                filtered = filtered.filter(p => p.type === typeFilter);
            }

            renderPublications(filtered);
        }

        function init() {
            renderPublications(publications);

            document.getElementById('search-input').addEventListener('input', filterPublications);
            document.getElementById('author-filter').addEventListener('change', filterPublications);
            document.getElementById('type-filter').addEventListener('change', filterPublications);

            console.log('%c[Database] Loaded ' + publications.length + ' publications', 'color:#64748b');
        }

        window.onload = init;
    </script>
